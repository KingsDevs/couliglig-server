version: "3.3"

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - couliglig_network

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-app
    depends_on:
      - redis
    restart: always
    volumes:
      # dnsmasq-managed hosts file (host → container)
      - /var/lib/dnsmasq/robots.hosts:/data/robots.hosts
    environment:
      - HOSTS_FILE=/data/robots.hosts
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - couliglig_network

networks:
  couliglig_network:
    driver: bridge