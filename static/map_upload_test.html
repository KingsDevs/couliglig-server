<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Map Upload Test</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;
      }

      .card {
        margin-bottom: 20px;
      }

      pre {
        background: #111;
        color: #0f0;
        padding: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <h2 class="mb-4">🗺 Couliglig Map Manager</h2>

      <!-- Upload Map -->
      <div class="card">
        <div class="card-header">Upload Map</div>

        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Dock Config ID</label>
            <input
              id="dock_config_id"
              class="form-control"
              placeholder="Config ID"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Map YAML</label>
            <input id="map_yaml" type="file" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Map Image</label>
            <input id="map_image" type="file" class="form-control" />
          </div>

          <button class="btn btn-success w-100" onclick="uploadMap()">
            Upload Map
          </button>
        </div>
      </div>

      <!-- List Maps -->
      <div class="card">
        <div class="card-header">List Maps</div>

        <div class="card-body">
          <button class="btn btn-primary w-100" onclick="listMaps()">
            Refresh Maps
          </button>
        </div>
      </div>

      <!-- Delete Map -->
      <div class="card">
        <div class="card-header">Delete Map</div>

        <div class="card-body">
          <input
            id="delete_map_id"
            class="form-control mb-3"
            placeholder="Map DB ID"
          />

          <button class="btn btn-danger w-100" onclick="deleteMap()">
            Delete Map
          </button>
        </div>
      </div>

      <!-- Response -->
      <div class="card">
        <div class="card-header">Response</div>

        <div class="card-body">
          <pre id="output"></pre>
        </div>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:8000";

      function show(data) {
        document.getElementById("output").textContent =
          JSON.stringify(data, null, 2);
      }

      async function uploadMap() {
        const formData = new FormData();

        const dockConfigId =
          document.getElementById("dock_config_id").value;

        const yamlFile =
          document.getElementById("map_yaml").files[0];

        const imageFile =
          document.getElementById("map_image").files[0];

        formData.append("dock_config_id", dockConfigId);
        formData.append("map_yaml", yamlFile);
        formData.append("map_image", imageFile);

        const res = await fetch(API + "/map/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        show(data);
      }

      async function listMaps() {
        const res = await fetch(API + "/map");

        const data = await res.json();

        show(data);
      }

      async function deleteMap() {
        const id = document.getElementById("delete_map_id").value;

        const res = await fetch(
          API + "/map/delete_map?map_db_id=" + id,
          {
            method: "DELETE"
          }
        );

        const data = await res.json();

        show(data);
      }
    </script>
  </body>
</html>
