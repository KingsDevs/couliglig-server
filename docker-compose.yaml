version: "3.3"

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - couliglig_network

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-app
    depends_on:
      - redis
    restart: always
    volumes:
      - ./db:/app/db
      # Optional dnsmasq-managed hosts file (host -> container)
      # - /var/lib/dnsmasq/robots.hosts:/data/robots.hosts
    # environment:
    #   - HOSTS_FILE=/data/robots.hosts
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - couliglig_network

  # robot-watcher:
  #   build:
  #     context: .
  #   container_name: robot-watcher
  #   restart: always
  #   depends_on:
  #     - redis
  #   environment:
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #   command: ["python", "robot_watcher.py"]
  #   networks:
  #     - couliglig_network

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    ports:
      - "8554:8554"      # RTSP
      - "8888:8888"      # HLS
      - "8889:8889"      # WebRTC HTTP
      - "9997:9997"      # API
      - "8189:8189/udp"  # WebRTC UDP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    command: /mediamtx.yml
    networks:
      - couliglig_network

networks:
  couliglig_network:
    driver: bridge
